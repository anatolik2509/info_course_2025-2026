version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: library-db
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: library-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
