server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/notesdb
spring.datasource.username=notesuser
spring.datasource.password=notespass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.freemarker.expose-request-attributes=true
spring.freemarker.suffix=.ftlh

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

redis.host=localhost
redis.port=6379

# Kafka — по умолчанию подключаемся к внешнему listener брокера на localhost.
# В docker-compose переменная окружения KAFKA_BOOTSTRAP_SERVERS=kafka:9092 перекрывает это значение.
kafka.bootstrap-servers=localhost:29092
kafka.topic.note-events=note-events

# Actuator — открываем эндпоинты для мониторинга
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
